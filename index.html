<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>160刮電子刮刮板</title>
<style>
:root{--bg:#080808;--card:#171717;--gold:#f5c542;--text:#f8f8f8;--muted:#aaa;--danger:#ff4d4f;--grid:#8e8e8e;--paper:#eeeeee}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top,#252525,#050505);color:var(--text)}
main{width:min(96vw,1120px);margin:0 auto;padding:14px 0 34px}
.header{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px}
.badge{display:inline-block;color:var(--gold);background:rgba(245,197,66,.15);border:1px solid rgba(245,197,66,.35);padding:5px 12px;border-radius:999px;font-weight:900}
h1{font-size:30px;margin:8px 0 4px}h2,h3{margin-bottom:8px}
p{color:var(--muted);margin:4px 0;line-height:1.45}
.count{background:var(--card);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:12px 14px;min-width:82px;text-align:center}
.count b{font-size:28px;color:var(--gold)}
.gameArea{display:flex;gap:12px;align-items:flex-start}
.statusPanel{width:180px;flex:0 0 180px;background:rgba(23,23,23,.95);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:12px;color:white}
.statusPanel h3{color:var(--gold);margin:0 0 8px;font-size:20px}
.statusBlock{border-bottom:1px solid rgba(255,255,255,.12);padding:8px 0}
.statusBlock:last-child{border-bottom:none}
.statusTitle{font-weight:1000;color:#fff;margin-bottom:6px}
.statusLine{color:#f5f5f5;font-weight:800;line-height:1.65;font-size:15px}
.statusNum{color:var(--gold)}
.boardWrap{background:#f3f3f3;border-radius:16px;padding:12px;overflow:auto;box-shadow:0 16px 50px rgba(0,0,0,.45);flex:1;min-width:0}
.boardShell{position:relative;display:inline-block;min-width:760px}
.board{display:grid;grid-template-columns:repeat(16,1fr);gap:0;min-width:760px;background:var(--paper);border-top:1px solid var(--grid);border-left:1px solid var(--grid)}
.cellBox{aspect-ratio:1/1;background:var(--paper);border-right:1px solid var(--grid);border-bottom:1px solid var(--grid);display:flex;justify-content:center;align-items:center;min-width:0;min-height:0;overflow:hidden}
.cellDot{width:76%;aspect-ratio:1/1;border-radius:50%;border:none;padding:0;display:flex;justify-content:center;align-items:center;text-align:center;line-height:1;background:#101010;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);color:transparent;font-size:12px;font-weight:1000}
.cellDot.used{width:54%;background:#fbfbfb;color:#222;border:1px solid #bdbdbd;box-shadow:none}
.prizeOutOverlay{position:absolute;inset:0;background:rgba(185,185,185,.94);color:white;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;font-size:48px;font-weight:1000;letter-spacing:2px;z-index:5;border-radius:4px;text-shadow:0 2px 8px rgba(0,0,0,.28);pointer-events:auto}
.prizeOutOverlay small{display:block;font-size:24px;margin-top:12px;letter-spacing:1px}
.admin{margin-top:14px;background:var(--card);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:14px}
button,input{width:100%;padding:13px;border-radius:12px;border:1px solid rgba(255,255,255,.14);font-size:16px}
button{margin:7px 0;background:var(--gold);color:#111;font-weight:900}
button.secondary{background:transparent;color:var(--text)}button.danger{background:var(--danger);color:white}
input{background:#0f0f0f;color:white;margin:6px 0 12px}
label{display:block;color:var(--muted);margin-top:8px}.hidden{display:none!important}
.settingsBtn{width:46px;height:46px;padding:0;border-radius:999px;background:rgba(0,0,0,.18);color:#666;border:1px solid rgba(255,255,255,.08);font-size:22px}
.floatingSettings{position:fixed;right:14px;bottom:14px;z-index:8}.settingsBtn:active{color:var(--gold);border-color:rgba(245,197,66,.35)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.78);display:grid;place-items:center;z-index:9;padding:16px}
.modalCard{width:min(94vw,430px);background:var(--card);border:1px solid rgba(255,255,255,.14);border-radius:22px;padding:18px;position:relative}
.close{position:absolute;right:10px;top:8px;width:44px;background:transparent;color:white;font-size:28px;border:none}
.scratchBox{position:relative;width:100%;max-width:330px;height:230px;margin:14px auto;border-radius:18px;overflow:hidden;background:linear-gradient(135deg,#fff0a8,#f5c542)}
.numberReveal{position:absolute;inset:0;display:flex;justify-content:center;align-items:center;text-align:center;color:#111;font-size:76px;font-weight:1000;line-height:1;z-index:1}
canvas{position:absolute;inset:0;z-index:2;touch-action:none}
#codeText{color:var(--muted);text-align:center;font-size:14px;margin:10px 0 6px}
#winningText{color:var(--gold);text-align:center;font-size:20px;font-weight:1000;margin:4px 0 8px}
.log{background:#0e0e0e;border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px;margin-top:8px;color:var(--muted);font-size:14px}
@media(max-width:700px){
  .gameArea{display:block}
  .statusPanel{width:100%;margin-bottom:10px}
  .statusPanel{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .statusPanel h3{grid-column:1/-1;font-size:18px}
  .statusBlock{border-bottom:none;border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:8px}
  .board,.boardShell{min-width:680px}
  h1{font-size:25px}
  .cellDot.used{font-size:11px}
  .prizeOutOverlay{font-size:36px}
  .prizeOutOverlay small{font-size:20px}
}
</style>
</head>
<body>
<main>
  <section class="header">
    <div>
      <span class="badge">160刮</span>
      <h1 id="title">現場刮刮樂</h1>
      <p id="subtitle">請選一格刮開號碼，號碼刮出來後按完成鎖定。</p>
    </div>
    
  </section>

  <section class="gameArea">
    <aside class="statusPanel">
      <h3>狀態</h3>
      <div class="statusBlock">
        <div class="statusTitle">獎項狀態</div>
        <div class="statusLine">總獎項：<span id="totalPrizeCount" class="statusNum">0</span></div>
        <div class="statusLine">已開出獎項：<span id="openedPrizeCount" class="statusNum">0</span></div>
        <div class="statusLine">剩餘獎項：<span id="remainingPrizeCount" class="statusNum">0</span></div>
      </div>
      <div class="statusBlock">
        <div class="statusTitle">刮卡狀態</div>
        <div class="statusLine">總刮數：<span id="totalScratchCount" class="statusNum">160</span></div>
        <div class="statusLine">已刮開：<span id="openedScratchCount" class="statusNum">0</span></div>
        <div class="statusLine">剩餘可刮：<span id="remainingScratchCount" class="statusNum">160</span></div>
      </div>
    </aside>

    <section class="boardWrap">
      <div class="boardShell">
        <div id="board" class="board"></div>
        <div id="prizeOutOverlay" class="prizeOutOverlay hidden">
          <div>所有大獎已出</div>
          <small>請更換新刮刮板</small>
        </div>
      </div>
    </section>
  </section>

  <button id="adminOpen" class="settingsBtn floatingSettings" title="設定">⚙</button>
  <p id="msg" class="hidden"></p>

  <section id="admin" class="admin hidden">
    <h2>設定</h2>
    <div id="loginBox">
      <input id="pass" type="password" placeholder="輸入設定密碼">
      <button id="login">登入</button>
    </div>

    <div id="adminBox" class="hidden">
      <label>活動名稱</label>
      <input id="titleInput">
      <label>副標</label>
      <input id="subtitleInput">
      <label>格數</label>
      <input id="cellCount" type="number" min="1" max="500">
      <label>每列幾格</label>
      <input id="cols" type="number" min="2" max="30">
      <label>數字最大值</label>
      <input id="maxNumber" type="number" min="1" max="999">
      <label>數字區刮開幾%顯示完成</label>
      <input id="scratchPercent" type="number" min="10" max="90">

      <h3>中獎號碼設定</h3>
      <p>填入中獎號碼，可填多個，用逗號分開。例如：12, 88, 168。</p>
      <label>中獎號碼</label>
      <input id="winningNumbers" placeholder="例如：12, 88, 168">

      <button id="save">儲存設定</button>
      <button id="reshuffle" class="secondary">重新產生數字</button>
      <button id="reset" class="danger">重置整張刮刮板</button>

      <h3>刮獎紀錄</h3>
      <div id="logs"></div>
    </div>
  </section>
</main>

<div id="modal" class="modal hidden">
  <div class="modalCard">
    <button id="close" class="close">×</button>
    <h2>刮開這一格</h2>
    <div class="scratchBox">
      <div id="numberText" class="numberReveal">1</div>
      <canvas id="canvas" width="330" height="230"></canvas>
    </div>
    <p id="codeText"></p>
    <p id="winningText" class="hidden"></p>
    <button id="finishBtn" class="hidden">完成</button>
  </div>
</div>

<script>
const DEFAULT={password:"0098",title:"現場刮刮樂",subtitle:"請選一格刮開號碼，號碼刮出來後按完成鎖定。",cellCount:160,cols:16,maxNumber:160,scratchPercent:50,winningNumbers:[]};

function loadConfig(){
  try{
    const saved=JSON.parse(localStorage.getItem("status_board_config"))||{};
    const merged=Object.assign({},DEFAULT,saved);
    if(!Array.isArray(merged.winningNumbers)) merged.winningNumbers=[];
    return merged;
  }catch(e){return DEFAULT}
}
function saveConfig(c){localStorage.setItem("status_board_config",JSON.stringify(c))}
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}
function makeNumbers(count,max){const nums=[];for(let i=1;i<=count;i++)nums.push(((i-1)%max)+1);return shuffle(nums)}
function newState(count,max){return{numbers:makeNumbers(count,max),used:Array.from({length:count},()=>false),logs:[]}}
function loadState(count,max){
  try{
    const s=JSON.parse(localStorage.getItem("status_board_state"));
    if(!s||!Array.isArray(s.numbers)||!Array.isArray(s.used)||s.numbers.length!==count||s.used.length!==count)return newState(count,max);
    return s;
  }catch(e){return newState(count,max)}
}
function saveState(s){localStorage.setItem("status_board_state",JSON.stringify(s))}
function makeCode(){return Math.random().toString(36).slice(2,8).toUpperCase()}
function parseNumberList(text){return String(text||"").split(/[,，\s]+/).map(x=>Number(x.trim())).filter(x=>Number.isFinite(x)&&x>0)}
function uniqueNumbers(arr){return [...new Set((arr||[]).map(Number).filter(x=>x>0))]}
function isWinningNumber(num){return uniqueNumbers(cfg.winningNumbers).includes(Number(num))}
function usedNumbers(){return state.used.map((used,i)=>used?Number(state.numbers[i]):null).filter(x=>x!==null)}
function openedWinningNumbers(){
  const wins=uniqueNumbers(cfg.winningNumbers);
  const used=usedNumbers();
  return wins.filter(n=>used.includes(n));
}
function allWinningNumbersOut(){
  const wins=uniqueNumbers(cfg.winningNumbers);
  if(!wins.length)return false;
  return openedWinningNumbers().length>=wins.length;
}

let cfg=loadConfig();
let state=loadState(Number(cfg.cellCount),Number(cfg.maxNumber));
let selected=null,currentNumber=null,currentCode="",scratched=false,hasStartedScratch=false;

const board=document.getElementById("board"),left=document.getElementById("left"),msg=document.getElementById("msg"),modal=document.getElementById("modal");

function logoutAdmin(){
  document.getElementById("admin").classList.add("hidden");
  document.getElementById("adminBox").classList.add("hidden");
  document.getElementById("loginBox").classList.remove("hidden");
  document.getElementById("pass").value="";
}

function renderStatus(){
  const totalPrize=uniqueNumbers(cfg.winningNumbers).length;
  const openedPrize=openedWinningNumbers().length;
  const remainingPrize=Math.max(totalPrize-openedPrize,0);
  const openedScratch=state.used.filter(Boolean).length;
  const totalScratch=Number(cfg.cellCount);
  const remainingScratch=Math.max(totalScratch-openedScratch,0);
  document.getElementById("totalPrizeCount").textContent=totalPrize;
  document.getElementById("openedPrizeCount").textContent=openedPrize;
  document.getElementById("remainingPrizeCount").textContent=remainingPrize;
  document.getElementById("totalScratchCount").textContent=totalScratch;
  document.getElementById("openedScratchCount").textContent=openedScratch;
  document.getElementById("remainingScratchCount").textContent=remainingScratch;
}

function render(){
  document.getElementById("title").textContent=cfg.title;
  document.getElementById("subtitle").textContent=cfg.subtitle;
  board.style.gridTemplateColumns=`repeat(${Number(cfg.cols)},1fr)`;
  board.innerHTML="";
  let remain=0;
  for(let i=0;i<Number(cfg.cellCount);i++){
    const box=document.createElement("div");box.className="cellBox";
    const dot=document.createElement("button");dot.className="cellDot";
    if(state.used[i]){dot.classList.add("used");dot.textContent=state.numbers[i]}
    else{remain++;dot.onclick=()=>openScratch(i)}
    box.appendChild(dot);board.appendChild(box);
  }
  if(left) left.textContent=remain;
  renderStatus();
  document.getElementById("prizeOutOverlay").classList.toggle("hidden",!allWinningNumbersOut());
  renderLogs();
}

function openScratch(i){
  selected=i;currentNumber=state.numbers[i];currentCode=makeCode();scratched=false;hasStartedScratch=false;
  document.getElementById("numberText").textContent=currentNumber;
  document.getElementById("codeText").textContent="";
  document.getElementById("winningText").textContent="";
  document.getElementById("winningText").classList.add("hidden");
  document.getElementById("finishBtn").classList.add("hidden");
  document.getElementById("finishBtn").disabled=false;
  document.getElementById("close").classList.remove("hidden");
  modal.classList.remove("hidden");
  setupCanvas();
}

const canvas=document.getElementById("canvas"),ctx=canvas.getContext("2d");let drawing=false;
function setupCanvas(){
  ctx.globalCompositeOperation="source-over";
  const g=ctx.createLinearGradient(0,0,canvas.width,canvas.height);
  g.addColorStop(0,"#111");g.addColorStop(.5,"#5c5c5c");g.addColorStop(1,"#111");
  ctx.fillStyle=g;ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="rgba(255,255,255,.92)";ctx.textAlign="center";ctx.font="900 36px sans-serif";ctx.fillText("刮開",canvas.width/2,canvas.height/2+12);
  ctx.globalCompositeOperation="destination-out";
}
function getPos(e){const rect=canvas.getBoundingClientRect();return{x:(e.clientX-rect.left)*canvas.width/rect.width,y:(e.clientY-rect.top)*canvas.height/rect.height}}
function scratch(e){
  if(!hasStartedScratch){hasStartedScratch=true;document.getElementById("close").classList.add("hidden")}
  const p=getPos(e);ctx.beginPath();ctx.arc(p.x,p.y,23,0,Math.PI*2);ctx.fill();checkScratch()
}
function checkScratch(){
  const boxW=Math.floor(canvas.width*0.56),boxH=Math.floor(canvas.height*0.50);
  const startX=Math.floor((canvas.width-boxW)/2),startY=Math.floor((canvas.height-boxH)/2);
  const data=ctx.getImageData(startX,startY,boxW,boxH).data;
  let clear=0;for(let i=3;i<data.length;i+=4)if(data[i]===0)clear++;
  const ratio=clear/(data.length/4);
  if(ratio>(Number(cfg.scratchPercent)/100)&&!scratched){
    scratched=true;
    document.getElementById("codeText").textContent="兌獎代碼："+currentCode;
    showWinningLine(currentNumber);
    document.getElementById("finishBtn").classList.remove("hidden");
  }
}
canvas.addEventListener("pointerdown",e=>{drawing=true;scratch(e)});
canvas.addEventListener("pointermove",e=>{if(drawing)scratch(e)});
canvas.addEventListener("pointerup",()=>drawing=false);
canvas.addEventListener("pointerleave",()=>drawing=false);

function showWinningLine(num){
  if(!isWinningNumber(num))return;
  document.getElementById("winningText").textContent="恭喜中獎";
  document.getElementById("winningText").classList.remove("hidden");
}
function lockCell(){
  if(selected===null)return;
  const lockedIndex=selected;
  const lockedNumber=currentNumber;
  const lockedCode=currentCode;
  const won=isWinningNumber(lockedNumber);
  selected=null;
  document.getElementById("finishBtn").disabled=true;
  modal.classList.add("hidden");
  state.used[lockedIndex]=true;
  state.logs.unshift({index:lockedIndex+1,number:lockedNumber,prize:won?"中獎":"",code:lockedCode,time:new Date().toLocaleString("zh-TW")});
  saveState(state);
  msg.textContent=`第 ${lockedIndex+1} 格已完成：號碼 ${lockedNumber}，代碼 ${lockedCode}`;
  render();
}
document.getElementById("finishBtn").onclick=()=>lockCell();
document.getElementById("close").onclick=()=>{if(!hasStartedScratch)modal.classList.add("hidden")};

document.getElementById("adminOpen").onclick=()=>{
  const admin=document.getElementById("admin");
  if(admin.classList.contains("hidden")){logoutAdmin();admin.classList.remove("hidden")}
  else{logoutAdmin()}
};
document.getElementById("login").onclick=()=>{
  if(document.getElementById("pass").value!==cfg.password){alert("密碼錯誤");return}
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("adminBox").classList.remove("hidden");
  fillAdmin();
};

function fillAdmin(){
  document.getElementById("titleInput").value=cfg.title;
  document.getElementById("subtitleInput").value=cfg.subtitle;
  document.getElementById("cellCount").value=cfg.cellCount;
  document.getElementById("cols").value=cfg.cols;
  document.getElementById("maxNumber").value=cfg.maxNumber;
  document.getElementById("scratchPercent").value=cfg.scratchPercent;
  document.getElementById("winningNumbers").value=uniqueNumbers(cfg.winningNumbers).join(", ");
  renderLogs();
}
document.getElementById("save").onclick=()=>{
  const oldCount=Number(cfg.cellCount),oldMax=Number(cfg.maxNumber);
  cfg.title=document.getElementById("titleInput").value||"現場刮刮樂";
  cfg.subtitle=document.getElementById("subtitleInput").value||"";
  cfg.cellCount=Number(document.getElementById("cellCount").value||160);
  cfg.cols=Number(document.getElementById("cols").value||16);
  cfg.maxNumber=Number(document.getElementById("maxNumber").value||cfg.cellCount);
  cfg.scratchPercent=Number(document.getElementById("scratchPercent").value||50);
  cfg.winningNumbers=uniqueNumbers(parseNumberList(document.getElementById("winningNumbers").value));
  saveConfig(cfg);
  if(oldCount!==Number(cfg.cellCount)||oldMax!==Number(cfg.maxNumber)){
    if(confirm("格數或數字最大值變更，會重置整張板，確定？")){
      state=newState(Number(cfg.cellCount),Number(cfg.maxNumber));saveState(state);
    }
  }
  alert("已儲存");render();logoutAdmin();
};
document.getElementById("reset").onclick=()=>{
  if(confirm("確定重置整張刮刮板？")){state=newState(Number(cfg.cellCount),Number(cfg.maxNumber));saveState(state);render();logoutAdmin()}
};
document.getElementById("reshuffle").onclick=()=>{
  if(confirm("確定重新產生數字？所有已刮紀錄會清掉。")){state=newState(Number(cfg.cellCount),Number(cfg.maxNumber));saveState(state);render();logoutAdmin()}
};
function renderLogs(){
  const logs=document.getElementById("logs");if(!logs)return;
  logs.innerHTML="";
  if(!state.logs.length){logs.innerHTML="<p>目前沒有紀錄。</p>";return}
  state.logs.forEach(l=>{
    const div=document.createElement("div");div.className="log";
    div.textContent=`第 ${l.index} 格｜號碼 ${l.number}${l.prize?`｜${l.prize}`:""}｜${l.code}｜${l.time}`;
    logs.appendChild(div);
  });
}
render();
</script>
</body>
</html>
